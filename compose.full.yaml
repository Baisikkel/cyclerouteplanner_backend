name: "${APPLICATION_NAME:-cyclerouteplanner}"
services:
  # PostgresSQL database service
  postgres:
    image: "postgis/postgis:17-3.5"
    container_name: "db"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cyclerouteplanner}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot backend service (for full containerized runs)
  backend:
    build:
      context: "."
      dockerfile: Dockerfile
    container_name: "backend"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cyclerouteplanner}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-postgres}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
