name: cyclerouteplanner

services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: cyclerouteplanner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cyclerouteplanner}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - cycleroute_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # BRouter bicycle routing engine (self-hosted). Built on the server from
  # the pinned Dockerfile in deploy/brouter/. The map data files (.rd5) must
  # be downloaded once on the server before the container can answer — run
  # deploy/brouter/fetch-segments.sh (from wherever the server keeps the
  # repo). Not exposed to the public internet; only the backend reaches it
  # over the internal docker network.
  brouter:
    build:
      context: ./brouter
    container_name: cyclerouteplanner-brouter
    restart: unless-stopped
    volumes:
      - ./brouter/profiles:/profiles
      - ./brouter/segments:/segments
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 17777 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  backend:
    # GHCR_OWNER must be lowercase to match the GHCR image path produced by CI.
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER (lowercase) is required}/cyclerouteplanner-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: cyclerouteplanner-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      brouter:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cyclerouteplanner}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-postgres}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      OSM_OVERPASS_BASE_URL: "${OSM_OVERPASS_BASE_URL:-https://overpass-api.de/api}"
      GEO_DEFAULT_BBOX_SOUTH: "${GEO_DEFAULT_BBOX_SOUTH:-59.30}"
      GEO_DEFAULT_BBOX_WEST: "${GEO_DEFAULT_BBOX_WEST:-24.50}"
      GEO_DEFAULT_BBOX_NORTH: "${GEO_DEFAULT_BBOX_NORTH:-59.52}"
      GEO_DEFAULT_BBOX_EAST: "${GEO_DEFAULT_BBOX_EAST:-24.93}"
      GEO_OVERPASS_TIMEOUT_SECONDS: "${GEO_OVERPASS_TIMEOUT_SECONDS:-25}"
      GEO_TALLINN_SOURCE_URL: "${GEO_TALLINN_SOURCE_URL:-https://gis.tallinn.ee/arcgis/rest/services/Rattateed/MapServer/0/query?where=1%3D1&outFields=*&f=geojson}"
      GEO_TALLINN_SOURCE_LAYER: "${GEO_TALLINN_SOURCE_LAYER:-tallinn_open_data}"
      GEO_TALLINN_FEATURE_ID_PROPERTY: "${GEO_TALLINN_FEATURE_ID_PROPERTY:-id}"
      GEO_TALLINN_FEATURE_NAME_PROPERTY: "${GEO_TALLINN_FEATURE_NAME_PROPERTY:-name}"
      # Inside the docker network the brouter service is reachable at this URL.
      ROUTING_BROUTER_BASE_URL: "${ROUTING_BROUTER_BASE_URL:-http://brouter:17777/brouter}"

volumes:
  cycleroute_postgres_data:
