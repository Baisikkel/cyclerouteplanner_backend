name: "${APPLICATION_NAME:-cyclerouteplanner}"
services:
  # PostgresSQL database service used for local development infrastructure.
  postgres:
    image: "postgis/postgis:17-3.5"
    container_name: "db"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cyclerouteplanner}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Links internal DB folder to a named volume
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

# Persistent volume for database data
volumes:
  postgres_data:

