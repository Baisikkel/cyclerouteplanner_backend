name: "${APPLICATION_NAME:-cyclerouteplanner}"
services:
  # PostgresSQL database service
  postgres:
    image: "postgis/postgis:17-3.5"
    container_name: "db"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cyclerouteplanner}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Links internal DB folder to a named volume
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # BRouter bicycle routing engine (self-hosted). The backend calls this
  # service to plan cycling routes. Map data must be downloaded once with
  # ./brouter/fetch-segments.sh before the container can answer.
  brouter:
    build:
      context: ./brouter
    container_name: "brouter"
    restart: unless-stopped
    environment:
      PLANET_AUTO_DOWNLOAD: "${BROUTER_PLANET_AUTO_DOWNLOAD:-true}"
      PLANET_DOWNLOAD_URL: "${BROUTER_PLANET_DOWNLOAD_URL:-https://download.geofabrik.de/europe/estonia-latest.osm.pbf}"
    ports:
      # Exposed on the host so developers running the backend from their
      # IDE (outside docker) can still reach the engine at localhost:17777.
      - "17777:17777"
    volumes:
      - ./brouter/profiles:/profiles
      - ./brouter/segments:/segments
      - ./brouter/build-input:/build-input
      - ./brouter/planet:/planet
      - ./brouter/srtm1_bef:/srtm1_bef
      - ./brouter/srtm3_bef:/srtm3_bef
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 17777 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # Spring Boot backend service (development stage: source mount + Maven).
  backend:
    build:
      context: "."
      dockerfile: Dockerfile
      target: development
    container_name: "backend"
    command: ["/bin/sh", "-c", "chmod +x mvnw && ./mvnw spring-boot:run"]
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - .:/app
      - maven_cache:/root/.m2  # <--- Use a named volume
    environment:
      APPLICATION_NAME: ${APPLICATION_NAME:-cyclerouteplanner} # Same as top-level compose `name:` / .env — Spring reads this (application.yml).
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cyclerouteplanner}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-postgres}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}"
      OSM_OVERPASS_BASE_URL: "${OSM_OVERPASS_BASE_URL:-https://overpass-api.de/api}"
      GEO_DEFAULT_BBOX_SOUTH: "${GEO_DEFAULT_BBOX_SOUTH:-59.30}"
      GEO_DEFAULT_BBOX_WEST: "${GEO_DEFAULT_BBOX_WEST:-24.50}"
      GEO_DEFAULT_BBOX_NORTH: "${GEO_DEFAULT_BBOX_NORTH:-59.52}"
      GEO_DEFAULT_BBOX_EAST: "${GEO_DEFAULT_BBOX_EAST:-24.93}"
      GEO_OVERPASS_TIMEOUT_SECONDS: "${GEO_OVERPASS_TIMEOUT_SECONDS:-25}"
      GEO_TALLINN_SOURCE_URL: "${GEO_TALLINN_SOURCE_URL:-https://gis.tallinn.ee/arcgis/rest/services/Rattateed/MapServer/0/query?where=1%3D1&outFields=*&f=geojson}"
      GEO_TALLINN_SOURCE_LAYER: "${GEO_TALLINN_SOURCE_LAYER:-tallinn_open_data}"
      GEO_TALLINN_FEATURE_ID_PROPERTY: "${GEO_TALLINN_FEATURE_ID_PROPERTY:-id}"
      GEO_TALLINN_FEATURE_NAME_PROPERTY: "${GEO_TALLINN_FEATURE_NAME_PROPERTY:-name}"
      # Inside the docker network, brouter is reachable at http://brouter:17777.
      ROUTING_BROUTER_BASE_URL: "${ROUTING_BROUTER_BASE_URL:-http://brouter:17777/brouter}"
    depends_on:
      postgres:
        condition: service_healthy
      brouter:
        condition: service_healthy

# Persistent volume for database data
volumes:
  postgres_data:
  maven_cache:
