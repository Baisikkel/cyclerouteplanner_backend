spring:
  profiles:
    default: local
  application:
    name: ${APPLICATION_NAME:cyclerouteplanner-backend}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

address:
  ads:
    base-url: ${ADS_BASE_URL:https://inaadress.maaamet.ee}
    status-path: ${ADS_STATUS_PATH:/inaadress/}
    search-path: ${ADS_SEARCH_PATH:/inaadress/gazetteer}
    search-query-param: ${ADS_SEARCH_QUERY_PARAM:address}
    search-limit-param: ${ADS_SEARCH_LIMIT_PARAM:results}
    cache-refresh-default-query: ${ADS_CACHE_REFRESH_DEFAULT_QUERY:Tallinn}
    cache-refresh-default-limit: ${ADS_CACHE_REFRESH_DEFAULT_LIMIT:100}

ingest:
  scheduler:
    enabled: ${INGEST_SCHEDULER_ENABLED:false}
    cron: ${INGEST_SCHEDULER_CRON:0 0 */6 * * *}
